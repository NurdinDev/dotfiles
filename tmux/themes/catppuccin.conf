# NOTE: you can use vars with $<var> and ${<var>} as long as the str is double quoted: ""
# WARNING: hex colors can't contain capital letters

# --> Catppuccin
thm_bg="#1e1e28"
thm_fg="#dadae8"
thm_cyan="#c2e7f0"
thm_black="#15121c"
thm_black1="#1A1826"
thm_black2="#1E1E2E"
thm_gray="#332e41"
thm_magenta="#c6aae8"
thm_pink="#e5b4e2"
thm_red="#e38c8f"
thm_green="#b1e3ad"
thm_yellow="#ebddaa"
thm_blue="#a4b9ef"
thm_orange="#f9c096"
thm_black4="#575268"

# ----------------------------=== Theme ===--------------------------

# status
# set -g status-position bottom
# set -g status "on"
set -g status-bg "${thm_black2}"
# set -g status-justify "left"
# set -g status-left-length "100"
# set -g status-right-length "100"

# messages
set -g message-style fg="${thm_cyan}",bg="${thm_gray}",align="centre"
set -g message-command-style fg="${thm_cyan}",bg="${thm_black1}",align="centre"

# panes
set -g pane-border-style fg="${thm_gray}"
set -g pane-active-border-style fg="${thm_blue}"

# windows
setw -g window-status-activity-style fg="${thm_red}",bg="${thm_black2}",none
# setw -g window-status-separator ""
setw -g window-status-style fg="${thm_black4}",bg="${thm_black2}",none
setw -g window-status-current-style fg="${thm_green}",bg="${thm_black2}",none
setw -g window-status-format "#I:#W"
setw -g window-status-current-format "#I:#W"
