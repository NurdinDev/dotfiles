env:
  TERM: xterm-256color

selection:
  semantic_escape_chars: ",│`|:\"' ()[]{}<>\t"
  save_to_clipboard: true

window:
    # Specified in number of columns/lines, not pixels.
  # If both are `0`, this setting is ignored.
  # dimensions:
  #   columns: 80
  #   lines: 24

  padding:
    x: 0
    y: 0

  dynamic_padding: true
  decorations: none
  startup_mode: Maximized

scrolling:
  # Maximum number of lines in the scrollback buffer.
  # Specifying '0' will disable scrolling.
  history: 10000

  # Number of lines the viewport will move for every line scrolled when
  # scrollback is enabled (history > 0).
  multiplier: 3

font:
  normal:
    family: DankMono Nerd Font Mono
    style: Regular
  bold:
    family: DankMono Nerd Font Mono
    style: Bold
  italic:
    family: DankMono Nerd Font Mono
    style: Italic
  bold_italic:
    family: DankMono Nerd Font Mono
    style: Bold Italic

  size: 20

  offset:
    x: 0
    y: 0

  glyph_offset:
    x: 0
    y: 0

cursor:
  style:
    blinking: Never

bell:
  animation: EaseOutExpo
  duration: 0

# Background opacity
#
# Window opacity as a floating point number from `0.0` to `1.0`.
# The value `0.0` is completely transparent and `1.0` is opaque.
background_opacity: 0.8

shell:
  program: /usr/local/bin/tmux
  args:
    - new-session
    - -A
    - -D
    - -s
    - main

mouse:
  hide_when_typing: true

# Live config reload (changes require restart)
live_config_reload: true

alt_send_esc: false

key_bindings:
  - { key: Left,     mods: Control, chars: "\x1bb"                       }
  - { key: Right,    mods: Control, chars: "\x1bf"                       }
  - { key: Comma, mods: Command, chars: "\x02\x2c" }
  - { key: D, mods: Command, chars: "\x02\x4b" }
  - { key: F, mods: Command, chars: "\x6c\x66\x63\x64\x0a" }
  - { key: G, mods: Command, chars: "\x02\x67" }
  - { key: K, mods: Command, chars: "\x02\x73" }
