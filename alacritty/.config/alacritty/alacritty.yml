env:
  TERM: xterm-256color

selection:
  semantic_escape_chars: ",│`|:\"' ()[]{}<>\t"
  save_to_clipboard: true

window:
  padding:
    x: 10
    y: 10

  dynamic_padding: true
  dynamic_title: true
  startup_mode: Windowed
  decorations: buttonless
  
  # Window decorations
  #
  # Available values:
  # - `full`: Window with title bar and title bar buttons
  # - `none`: Window without title bar, rounded corners, or drop shadow
  # - `transparent`: Window with title bar with transparent background and title
  #   bar buttons
  # - `buttonless`: Window with title bar with transparent background and no
  #   title bar buttons
  # decorations: none

scrolling:
  # Maximum number of lines in the scrollback buffer.
  # Specifying '0' will disable scrolling.
  history: 10000

  # Number of lines the viewport will move for every line scrolled when
  # scrollback is enabled (history > 0).
  multiplier: 3

font:
  normal:
    family: "JetBrainsMono Nerd Font"
    style: Regular
  bold:
    family: "JetBrainsMono Nerd Font"
    style: Bold
  italic:
    family: "JetBrainsMono Nerd Font"
    style: Italic
  bold_italic:
    family: "JetBrainsMono Nerd Font"
    style: Bold Italic

  size: 20

  offset:
    x: 0
    y: 0

  glyph_offset:
    x: 0
    y: 0

  # thin stroke font rendering (macos)
  # Thin strokes is suitable for retina displays. Set to false for non-retina
  use_thin_strokes: true
  # draw bold text with bright color variants
draw_bold_text_with_bright_colors: true

bell:
  animation: EaseOutExpo
  duration: 0

mouse:
  hide_when_typing: true
  double_click: { threshold: 300 }
  triple_click: { threshold: 300 }

cursor:
  style: Block
  unfocused_hollow: false

# Live config reload (changes require restart)
live_config_reload: true

# import:
#   - ~/.config/alacritty/dark_default.yml
import:
  - ~/.config/alacritty/catppuccin.yml

