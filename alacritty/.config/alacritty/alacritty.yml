env:
  TERM: alacritty

window:
  dimensions:
    columns: 160
    lines: 48

  padding:
    x: 2
    y: 2

  # Spread additional padding evenly around the terminal content.
  dynamic_padding: false

  dynamic_title: true


  # Window decorations
  # Setting this to false will result in window without borders and title bar.
  decorations: full
  # Background opacity
  opacity: 1.0
  
    # Window title
  title: Alacritty

  # Window class (Linux/BSD only):
  class:
    # Application instance name
    instance: Alacritty
    # General application class
    general: Alacritty


# When true, bold text is drawn using the bright variant of colors.
draw_bold_text_with_bright_colors: true

scrolling:
  # Maximum number of lines in the scrollback buffer.
  # Specifying '0' will disable scrolling.
  history: 10000

  # Number of lines the viewport will move for every line scrolled when
  # scrollback is enabled (history > 0).
  multiplier: 3

# font:
#   normal:
#     family: "MonoLisa Nerd Font Mono"

font:
  # The normal (roman) font face to use.
  normal:
    family: SFMono Nerd Font 
    style: Regular

  # The bold font face
  bold:
    family: SFMono Nerd Font
    style: Bold

  # The italic font face
  italic:
    family: SFMono Nerd Font
    style: Regular Italic

  # Point size of the font
  size: 18.0

  # Offset is the extra space around each character. offset.y can be thought of
  # as modifying the linespacing, and offset.x as modifying the letter spacing.
  offset:
    x: 0
    y: 0

  # Glyph offset determines the locations of the glyphs within their cells with
  # the default being at the bottom. Increase the x offset to move the glyph to
  # the right, increase the y offset to move the glyph upward.
  glyph_offset:
    x: 0
    y: 0

  # OS X only: use thin stroke font rendering. Thin strokes are suitable
  # for retina displays, but for non-retina you probably want this set to
  # false.
  use_thin_strokes: true

alt_send_esc: true

bell:
  animation: EaseOutExpo
  duration: 0


mouse:
  # Click settings
  #
  # The `double_click` and `triple_click` settings control the time
  # alacritty should wait for accepting multiple clicks as one double
  # or triple click.
  double_click: { threshold: 300 }
  triple_click: { threshold: 300 }

  # If this is `true`, the cursor is temporarily hidden when typing.
  hide_when_typing: true

cursor:
  style: Block
  unfocused_hollow: false

selection:
  semantic_escape_chars: ",│`|:\"' ()[]{}<>\t"
  save_to_clipboard: true


# Live config reload (changes require restart)
live_config_reload: true

debug:
  # Should display the render timer
  render_timer: false

shell:
  program: /opt/homebrew/bin/tmux
  args:
    - new-session
    - -A
    - -D
    - -s
    - main

key_bindings:
  - { key: J,        mods: Alt,           chars: "\x1bj"                       }
  - { key: K,        mods: Alt,           chars: "\x1bk"                       }
  - { key: H,        mods: Alt,           chars: "\x1bh"                       }
  - { key: V,        mods: Alt,           chars: "\x1bv"                       }
  - { key: I,        mods: Alt,           chars: "\x1bi"                       }
  - { key: L,        mods: Alt,           chars: "\x1bl"                       }
  - { key: P,        mods: Command,       chars: "\x10"                        } # CMD+p to Ctr+p used for vim
  - { key: P,        mods: Command|shift, chars: "\x20\x63\x63"                } # CMD+shift+p to <space>cc used for vim
  - { key: O,        mods: Command|shift, chars: "\x20\x64\x73"                } # CMD+Shift+O to <space>ds
  - { key: S,        mods: Command,       chars: "\x1b\x3a\x77\x0a"            } # CMD+w to :w<CR>
  - { key: B,        mods: Command,       chars: "\x0e"                        } # CMD+b to ctrl+n
  - { key: E,        mods: Command|Shift, chars: "\x20\x6e"                    } # CMD+shift+e to <space>n


  - { key: V,        mods: Command, action: Paste                        }
  - { key: C,        mods: Command, action: Copy                         }
  - { key: Q,        mods: Command, action: Quit                         }
  - { key: N,        mods: Command, command: { program: "open", args: ["-nb", "io.alacritty"] } }
